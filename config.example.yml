# B站视频下载配置示例
# 复制此文件为 config.yml 并修改配置

# 添加 UP 主空间链接，每行一个
link:
  - https://space.bilibili.com/12345678
  - https://space.bilibili.com/87654321

# 下载目录（相对路径，项目根目录下）
path: ./Downloaded

# 时间过滤：只下载该日期之后的视频（YYYY-MM-DD），留空不限制
start_time: ""
end_time: ""

# Cookie 文件路径
cookies_file: cookies.txt

# 增量记录文件
archive_file: archive.txt